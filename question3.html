<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Food?</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <audio class="page-audio" autoplay loop preload="auto">
      <source src="./resource/choco_icecream.mp3" type="audio/mpeg">
    </audio>
    <main class="screen">
      <section class="card">
        <img class="hero-img" src="./resource/shy.gif" alt="shy sticker" width="320" height="320">
        <div class="stack">
          <h1 class="wide-title">So wanna go out and have something together?</h1>
          <div class="food-grid" aria-label="food ideas">
            <span class="food-tile"><img src="./resource/idli.gif" alt="idli" width="76" height="76" loading="lazy"></span>
            <span class="food-tile"><img src="./resource/icecerea.gif" alt="ice cream" width="76" height="76" loading="lazy"></span>
            <span class="food-tile"><img src="./resource/waffles.gif" alt="cute sticker" width="76" height="76" loading="lazy"></span>
          </div>
          <div class="actions">
            <a class="btn btn-primary" href="./question4.html">Fineeeee</a>
            <button class="btn btn-soft" type="button" data-dodge data-fallback="./emotionpage.html">Nah, something else</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
