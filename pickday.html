<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pick the day</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <audio class="page-audio" autoplay loop preload="auto">
      <source src="./resource/choco_icecream.mp3" type="audio/mpeg">
    </audio>
    <main class="screen">
      <section class="card">
        <video class="hero-video" autoplay muted loop controls preload="auto" playsinline>
          <source src="./resource/dateTrim.mp4" type="video/mp4">
        </video>
        <div class="stack">
          <h1>So when?</h1>
          <form action="https://formspree.io/f/mlgzwyaa" method="POST" data-date-form>
            <input type="hidden" name="_subject" value="Date plan reply">
            <div class="field">
              <label for="day">Pick a day</label>
              <input type="date" id="day" name="day" required>
            </div>
            <div class="field">
              <label for="message">Say something</label>
              <textarea id="message" name="message">I'm in</textarea>
            </div>
            <button class="btn btn-primary" type="submit">I accept with my money</button>
            <p class="form-status" role="status" aria-live="polite"></p>
          </form>
          <a class="btn btn-dark" href="./emotionpage.html">I'm blocking you</a>
        </div>
      </section>
    </main>
  </body>
</html>
